<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>TX Freedom - Playable</title>
  <script>
    // Earliest-possible crash net — runs before the module script below, so it also catches errors
    // that happen during module evaluation/import (e.g. a WASM init failure) which main.ts's own
    // main().catch() can miss if it's thrown before that .catch() is even attached, or a promise
    // that hangs forever without ever rejecting. Without this, a failure here has NO visible symptom
    // other than the dark #loader gradient staying up forever — reads as "the game doesn't run" with
    // no clue why. Shows whatever we caught (or a generic hint after a timeout) as red text overlay.
    (function () {
      var shown = false;
      function show(msg) {
        if (shown) return; shown = true;
        var pre = document.createElement('pre');
        pre.style.cssText = 'position:absolute;inset:0;z-index:999;color:#f88;background:#100;' +
          'padding:16px;font:12px monospace;white-space:pre-wrap;overflow:auto;margin:0;';
        pre.textContent = msg;
        document.body.appendChild(pre);
      }
      window.addEventListener('error', function (e) {
        show('[startup] ' + (e.error && e.error.stack || e.message || e));
      });
      window.addEventListener('unhandledrejection', function (e) {
        var r = e.reason;
        show('[startup] unhandled rejection: ' + (r && r.stack || r));
      });
      // Watchdog: if nothing removed #loader within 15s AND no error fired, something hung silently
      // (e.g. a WASM instantiate that neither resolves nor rejects on a given device/WebKit build).
      setTimeout(function () {
        var el = document.getElementById('loader');
        if (el && document.body.contains(el) && !el.classList.contains('hidden')) {
          show('[startup] still loading after 15s with no error — something hung during init ' +
            '(WebGL/WASM support on this device?). userAgent: ' + navigator.userAgent);
        }
      }, 15000);
    })();
  </script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(180deg, #1c2330 0%, #0e1320 50%, #06090f 100%);
    }

    #game-container {
      position: relative;
      width: 100%; height: 100%;
      max-width: 1080px;
      margin: 0 auto;
    }

    #three-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      display: block;
    }

    #ui-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10;
      pointer-events: none;
    }

    /* Opaque cover shown until the real GLBs decode — hides the primitive placeholder flash + asset pop-in.
       Inline in the HTML so it paints instantly (before the JS module runs); main.ts removes it when ready. */
    #loader {
      position: absolute; inset: 0; z-index: 50;
      background: linear-gradient(180deg, #1c2330 0%, #0e1320 50%, #06090f 100%);
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.4s ease;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }
    #loader .spin {
      width: 46px; height: 46px; border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.14); border-top-color: rgba(245,205,40,0.92);
      animation: loader-rot 0.8s linear infinite;
    }
    @keyframes loader-rot { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="three-canvas"></canvas>
    <div id="ui-overlay"></div>
    <div id="loader"><div class="spin"></div></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
